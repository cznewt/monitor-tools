name: PR render check

on:
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cznewt/monitor-tools
  PR_IMAGE_TAG: monitor-tools:pr-${{ github.event.pull_request.number }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: "Detect change types"
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.filter.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            image:
              - 'docker/Dockerfile'
              - 'docker/files/requirements.txt'
              - 'VERSION'

  build-image:
    name: "Build PR image"
    needs: changes
    if: needs.changes.outputs.image == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: false
          tags: ${{ env.PR_IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/pr-image.tar
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-image
          path: /tmp/pr-image.tar
          retention-days: 1

  render-check:
    name: "Render & lint all configs"
    needs: [changes, build-image]
    if: |
      always() &&
      (needs.build-image.result == 'success' || needs.build-image.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        if: needs.changes.outputs.image != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull baseline :latest image
        if: needs.changes.outputs.image != 'true'
        run: |
          echo "TEST_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_ENV"
          docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: Download freshly-built PR image
        if: needs.changes.outputs.image == 'true'
        uses: actions/download-artifact@v4
        with:
          name: pr-image
          path: /tmp

      - name: Load PR image
        if: needs.changes.outputs.image == 'true'
        run: |
          docker load --input /tmp/pr-image.tar
          echo "TEST_IMAGE=${{ env.PR_IMAGE_TAG }}" >> "$GITHUB_ENV"

      - name: Run do-all in test image
        run: |
          docker run --rm --user root \
            -v "$PWD/docker/files/config:/config:ro" \
            -v "$PWD/docker/files/mixins:/mixins:ro" \
            -v "$PWD/docker/files/scripts:/scripts:ro" \
            "$TEST_IMAGE" \
            bash -lc 'do-all'

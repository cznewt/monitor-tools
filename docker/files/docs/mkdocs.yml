site_name: Monitoring
site_description: Generated alert catalog, runbooks, and inventory from the deployed monitor-tools config.
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
plugins:
  - search
  - gen-files:
      scripts:
        - gen_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
markdown_extensions:
  - tables
  - admonition
  - toc:
      permalink: true

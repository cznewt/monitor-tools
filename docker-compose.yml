services:
  monitor-tools:
    # command: sleep infinity
    # build:
    #   context: ./docker
    #   dockerfile: Dockerfile
    image: ghcr.io/cznewt/jupyter-monitor-tools:latest
    volumes:
      - ./docker/files/mixins:/mixins
      - ./docker/files/scripts:/scripts
      - ./docker/files/config_dev:/config
      - ./notebooks:/source/notebooks
    env_file: ".env"
    ports:
      - 8888:8888

  # Optional: Prophet-based anomaly scorer (see extra/anomaly-scorer/).

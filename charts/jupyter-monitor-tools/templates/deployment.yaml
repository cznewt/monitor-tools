apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jupyter-monitor-tools.fullname" . }}
  labels:
    {{- include "jupyter-monitor-tools.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "jupyter-monitor-tools.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "jupyter-monitor-tools.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: jupyter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
          {{- if or .Values.env .Values.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ include "jupyter-monitor-tools.secretName" . }}
          {{- end }}
          {{- if .Values.configs }}
          volumeMounts:
            - name: configs
              mountPath: /config
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.configs }}
      volumes:
        - name: configs
          configMap:
            name: {{ include "jupyter-monitor-tools.fullname" . }}-configs
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
